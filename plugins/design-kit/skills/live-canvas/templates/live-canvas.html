// ── Standalone frame functions ──────────────
function tryConvertToEmbed(input) {
  try {
    const u = new URL(input);
    // Figma: design, board, proto, file URLs → embed.figma.com
    if (u.hostname === 'www.figma.com' || u.hostname === 'figma.com') {
      const match = u.pathname.match(/^\/(design|board|proto|file)\//);
      if (match) {
        u.hostname = 'embed.figma.com';
        u.searchParams.set('embed-host', 'share');
        return u.toString();
      }
    }
    return null;
  } catch {
    return null;
  }
}

function addUrl() {
  const input = prompt(
    'URL or embed code:\n\n' +
    'You can paste:\n' +
    '• A URL (any website)\n' +
    '• An <iframe> embed code (from Figma, etc.)\n' +
    '• A Figma link (auto-converts to embed)\n\n' +
    'Note: Many sites block iframe embedding.'
  );
  if (!input) return;

  let url, w, h, label;
  let allowfullscreen = false;
  let allow = '';
  let sandbox = '';

  const trimmed = input.trim();

  if (trimmed.startsWith('<iframe') || trimmed.startsWith('<IFRAME')) {
    // ── Path 1: Embed code ──
    const doc = new DOMParser().parseFromString(trimmed, 'text/html');
    const iframe = doc.querySelector('iframe');
    if (!iframe || !iframe.src) {
      alert('Could not parse embed code. Make sure it contains an <iframe> with a src attribute.');
      return;
    }
    url = iframe.src;
    w = parseInt(iframe.width) || 800;
    h = parseInt(iframe.height) || 450;
    allowfullscreen = iframe.hasAttribute('allowfullscreen');
    allow = iframe.getAttribute('allow') || '';
    sandbox = iframe.getAttribute('sandbox') || '';
    try { label = new URL(url).hostname; } catch { label = url; }

  } else if ((url = tryConvertToEmbed(trimmed))) {
    // ── Path 2: Known service URL → auto-convert ──
    w = parseInt(prompt('Width:', '800')) || 800;
    h = parseInt(prompt('Height:', '450')) || 450;
    allowfullscreen = true;
    try { label = new URL(url).hostname; } catch { label = url; }

  } else {
    // ── Path 3: Plain URL (existing behavior) ──
    url = trimmed;
    w = parseInt(prompt('Width:', '1440')) || 1440;
    h = parseInt(prompt('Height:', '900')) || 900;
    try { label = new URL(url).hostname; } catch { label = url; }
  }

  const center = screenToCanvas(window.innerWidth / 2, window.innerHeight / 2);
  frames.push({
    id: generateFrameId(),
    x: center.x - w / 2, y: center.y - h / 2,
    url, label, width: w, height: h,
    ...(allowfullscreen && { allowfullscreen: true }),
    ...(allow && { allow }),
    ...(sandbox && { sandbox }),
  });
  render();
  saveCanvas();
}

function deleteFrame(frameId) {
  const idx = frames.findIndex(f => f.id === frameId);
  if (idx === -1) return;
  if (!confirm(`Remove "${frames[idx].label}" frame?`)) return;
  frames.splice(idx, 1);
  delete positions[`frame-${frameId}`];
  render();
  saveCanvas();
}

function duplicateNode(type, id, extra) {
  const OFFSET = 50;
  if (type === 'artboard') {
    const bIdx = parseInt(id);
    const sIdx = extra;
    const src = branches[bIdx]?.screens[sIdx];
    if (!src) return;
    branches[bIdx].screens.push({ name: src.name + ' Copy', route: src.route, width: src.width, height: src.height });
  } else if (type === 'note') {
    const src = notes.find(n => n.id === id);
    if (!src) return;
    const nx = positions[`note-${src.id}`]?.x ?? src.x;
    const ny = positions[`note-${src.id}`]?.y ?? src.y;
    notes.push({ id: generateNoteId(), x: nx + OFFSET, y: ny + OFFSET, text: src.text, width: src.width || 220, height: src.height || 160 });
  } else if (type === 'frame') {
    const src = frames.find(f => f.id === id);
    if (!src) return;
    const fx = positions[`frame-${src.id}`]?.x ?? src.x;
    const fy = positions[`frame-${src.id}`]?.y ?? src.y;
    frames.push({ id: generateFrameId(), x: fx + OFFSET, y: fy + OFFSET, url: src.url, label: src.label, width: src.width, height: src.height });
  } else if (type === 'design') {
    const src = designNodes.find(n => n.id === id);
    if (!src) return;
    const dx = positions[`ds-${src.id}`]?.x ?? src.x;
    const dy = positions[`ds-${src.id}`]?.y ?? src.y;
    const newId = `ds-${Date.now()}`;
    designNodes.push({
      id: newId, x: dx + OFFSET, y: dy + OFFSET,
      tokens: JSON.parse(JSON.stringify(src.tokens)),
      source: src.source, modifications: {},
    });
  } else if (type === 'file') {
    const src = fileNodes.find(n => n.id === id);
    if (!src) return;
    const fx = positions[`file-${src.id}`]?.x ?? src.x;
    const fy = positions[`file-${src.id}`]?.y ?? src.y;
    fileNodes.push({
      id: generateFileNodeId(),
      x: fx + OFFSET, y: fy + OFFSET,
      source: src.source, label: src.label,
      fileType: src.fileType,
      width: src.width, height: src.height,
      content: src.content, originalContent: src.originalContent,
    });
  }
  render();
  saveCanvas();
}

// ── Design node functions ───────────────────
function updateToken(nodeId, tokenName, newValue, originalValue) {
  const node = designNodes.find(n => n.id === nodeId);
  if (!node) return;
  if (!node.modifications) node.modifications = {};
  if (newValue === originalValue) {
    delete node.modifications[tokenName];
  } else {
    node.modifications[tokenName] = newValue;
  }
  renderDesignNodes();
  saveCanvas();
}

function updateTokenFromSlider(nodeId, tokenName, numericValue, unit, originalValue) {
  updateToken(nodeId, tokenName, numericValue + unit, originalValue);
}

function copyTokenChanges(nodeId) {
  const node = designNodes.find(n => n.id === nodeId);
  if (!node || !node.modifications) return;

  const lines = ['Update the following design tokens:\n'];

  for (const [category, tokens] of Object.entries(node.tokens)) {
    const categoryChanges = [];
    for (const [name, original] of Object.entries(tokens)) {
      if (node.modifications[name] !== undefined) {
        categoryChanges.push(`- Change \`${name}\` from \`${original}\` to \`${node.modifications[name]}\``);
      }
    }
    if (categoryChanges.length > 0) {
      const label = category.charAt(0).toUpperCase() + category.slice(1);
      lines.push(`**${label}:**`);
      lines.push(...categoryChanges);
      lines.push('');
    }
  }

  if (node.source) {
    lines.push(`Source file: \`${node.source}\``);
  }

  navigator.clipboard.writeText(lines.join('\n')).then(() => showCopyToast());
}

async function saveTokenChanges(nodeId) {
  const node = designNodes.find(n => n.id === nodeId);
  if (!node || !node.modifications || Object.keys(node.modifications).length === 0) return;
  if (!node.source) {
    showClipToast('No source file configured', true);
    return;
  }

  // Build changes array from modifications
  const changes = Object.entries(node.modifications).map(([name, value]) => ({ name, value }));

  try {
    const res = await fetch('/api/tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: node.source, changes }),
    });
    const data = await res.json();

    if (!res.ok) {
      showClipToast(data.error || 'Save failed', true);
      return;
    }

    // Update baselines: merge modifications into the token categories
    for (const [name, value] of Object.entries(node.modifications)) {
      for (const category of Object.values(node.tokens)) {
        if (category[name] !== undefined) {
          category[name] = value;
          break;
        }
      }
    }

    // Clear modifications since they're now the baseline
    node.modifications = {};
    render();
    saveCanvas();
    showClipToast(`Saved ${data.updated} token${data.updated !== 1 ? 's' : ''}`);

    // Reload all artboard iframes so the new token values are reflected
    setTimeout(() => {
      document.querySelectorAll('.artboard-frame iframe').forEach(f => { f.src = f.src; });
    }, 600);
  } catch (err) {
    showClipToast('Save failed — server error', true);
  }
}

async function resetTokens(nodeId) {
  const node = designNodes.find(n => n.id === nodeId);
  if (!node) return;
  if (!node.source) {
    showClipToast('No source file configured', true);
    return;
  }

  // Collect all token names across categories
  const names = [];
  for (const category of Object.values(node.tokens)) {
    names.push(...Object.keys(category));
  }

  try {
    const res = await fetch('/api/tokens/read', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: node.source, names }),
    });
    const data = await res.json();

    if (!res.ok) {
      showClipToast(data.error || 'Reset failed', true);
      return;
    }

    // Update baselines with values read from disk
    let updated = 0;
    for (const [name, value] of Object.entries(data.tokens)) {
      for (const category of Object.values(node.tokens)) {
        if (category[name] !== undefined) {
          category[name] = value;
          updated++;
          break;
        }
      }
    }

    // Clear modifications — disk is the new truth
    node.modifications = {};
    render();
    saveCanvas();
    showClipToast(`Reset ${updated} token${updated !== 1 ? 's' : ''} from disk`);
  } catch (err) {
    showClipToast('Reset failed — server error', true);
  }
}

function deleteDesignNode(nodeId) {
  if (!confirm('Remove design tokens?')) return;
  const idx = designNodes.findIndex(n => n.id === nodeId);
  if (idx !== -1) {
    designNodes.splice(idx, 1);
    delete positions[`ds-${nodeId}`];
    render();
    saveCanvas();
  }
}

// ── Transform ───────────────────────────────
function updateTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomDisplay.textContent = Math.round(scale * 100) + '%';
}

function zoomTo(newScale, cx, cy) {
  const prevScale = scale;
  newScale = Math.max(0.05, Math.min(3, newScale));
  if (cx === undefined) cx = window.innerWidth / 2;
  if (cy === undefined) cy = window.innerHeight / 2;
  const ratio = newScale / prevScale;
  panX = cx - ratio * (cx - panX);
  panY = cy - ratio * (cy - panY);
  scale = newScale;
  updateTransform();
  updateMinimap();
}

function fitAll() {
  const items = computeLayout().filter(i => i.type === 'artboard');
  if (items.length === 0 && notes.length === 0 && designNodes.length === 0 && frames.length === 0 && fileNodes.length === 0) return;

  items.forEach(item => {
    const key = `artboard-${item.branchIdx}-${item.screenIdx}`;
    if (positions[key]) { item.x = positions[key].x; item.y = positions[key].y; }
  });

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  items.forEach(ab => {
    if (ab.x < minX) minX = ab.x;
    if (ab.y - BRANCH_LABEL_HEIGHT - 10 < minY) minY = ab.y - BRANCH_LABEL_HEIGHT - 10;
    if (ab.x + ab.width > maxX) maxX = ab.x + ab.width;
    if (ab.y + ab.height > maxY) maxY = ab.y + ab.height;
  });

  notes.forEach(n => {
    const nx = positions[`note-${n.id}`]?.x ?? n.x;
    const ny = positions[`note-${n.id}`]?.y ?? n.y;
    const nw = n.width || 220;
    if (nx < minX) minX = nx;
    if (ny < minY) minY = ny;
    if (nx + nw > maxX) maxX = nx + nw;
    if (ny + 160 > maxY) maxY = ny + 160;
  });

  designNodes.forEach(dn => {
    const dx = positions[`ds-${dn.id}`]?.x ?? dn.x;
    const dy = positions[`ds-${dn.id}`]?.y ?? dn.y;
    if (dx < minX) minX = dx;
    if (dy < minY) minY = dy;
    if (dx + (dn.width || 380) > maxX) maxX = dx + (dn.width || 380);
    if (dy + 300 > maxY) maxY = dy + 300;
  });

  frames.forEach(f => {
    const fx = positions[`frame-${f.id}`]?.x ?? f.x;
    const fy = positions[`frame-${f.id}`]?.y ?? f.y;
    if (fx < minX) minX = fx;
    if (fy < minY) minY = fy;
    if (fx + f.width > maxX) maxX = fx + f.width;
    if (fy + f.height > maxY) maxY = fy + f.height;
  });

  fileNodes.forEach(fn => {
    const fnx = positions[`file-${fn.id}`]?.x ?? fn.x;
    const fny = positions[`file-${fn.id}`]?.y ?? fn.y;
    if (fnx < minX) minX = fnx;
    if (fny < minY) minY = fny;
    if (fnx + fn.width > maxX) maxX = fnx + fn.width;
    if (fny + fn.height > maxY) maxY = fny + fn.height;
  });

  if (minX === Infinity) return;

  const contentW = maxX - minX;
  const contentH = maxY - minY;
  const viewW = window.innerWidth - 40;
  const viewH = window.innerHeight - 120;
  const fitScale = Math.min(viewW / contentW, viewH / contentH, 1) * 0.9;

  scale = fitScale;
  panX = (viewW - contentW * scale) / 2 - minX * scale + 20;
  panY = (viewH - contentH * scale) / 2 - minY * scale + 56;

  updateTransform();
  updateMinimap();
}

// ── Pan + Drag ──────────────────────────────
document.addEventListener('mousedown', (e) => {
  if (clipActive) return;

  // Note mode: place a note on click
  if (noteMode) {
    if (e.target.closest('#toolbar') || e.target.closest('#titlebar')) return;
    const canvasPos = screenToCanvas(e.clientX, e.clientY);
    addNote(canvasPos.x, canvasPos.y);
    toggleNoteMode();
    return;
  }

  // Marker mode: place a marker on click
  if (markerMode) {
    if (e.target.closest('#toolbar') || e.target.closest('#titlebar')) return;
    const cp = screenToCanvas(e.clientX, e.clientY);
    addMarker(cp.x, cp.y);
    toggleMarkerMode();
    return;
  }

  // Drag handle: start dragging (skip if clicking into editable text)
  const grip = e.target.closest('[data-drag-handle]');
  if (grip && !e.target.closest('[contenteditable]')) {
    const draggable = grip.closest('[data-drag-key]');
    if (draggable) {
      e.preventDefault();
      isDragging = true;
      dragTarget = draggable;
      dragKey = draggable.dataset.dragKey;
      const canvasPos = screenToCanvas(e.clientX, e.clientY);
      dragOffsetX = parseFloat(draggable.style.left) - canvasPos.x;
      dragOffsetY = parseFloat(draggable.style.top) - canvasPos.y;
      document.body.style.cursor = 'grabbing';
      document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'none');
      return;
    }
  }

  // UI chrome — don't pan
  if (e.target.closest('#toolbar') || e.target.closest('#titlebar') || e.target.closest('#minimap') || e.target.closest('#prompt-panel') || e.target.closest('#popover') || e.target.closest('#canvas-dropdown') || e.target.closest('#add-dropdown') || e.target.closest('[data-pop]') || e.target.closest('.note-wrapper') || e.target.closest('.marker-wrapper') || e.target.closest('.design-node') || e.target.closest('.standalone-frame') || e.target.closest('.file-node') || e.target.closest('.node-delete')) return;

  // Start panning
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  document.body.classList.add('panning');
  document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'none');
});

document.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const canvasPos = screenToCanvas(e.clientX, e.clientY);
    const newX = canvasPos.x + dragOffsetX;
    const newY = canvasPos.y + dragOffsetY;
    dragTarget.style.left = newX + 'px';
    dragTarget.style.top = newY + 'px';
    positions[dragKey] = { x: newX, y: newY };
    updateMinimap();
    return;
  }
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  updateTransform();
  updateMinimap();
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    document.body.style.cursor = '';
    document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'auto');

    // Sync positions back to data objects for notes and design nodes
    if (dragKey && dragKey.startsWith('note-')) {
      const noteId = dragKey.replace('note-', '');
      const note = notes.find(n => n.id === noteId);
      if (note && positions[dragKey]) {
        note.x = positions[dragKey].x;
        note.y = positions[dragKey].y;
      }
    }
    if (dragKey && dragKey.startsWith('ds-')) {
      const dsId = dragKey.replace('ds-', '');
      const dn = designNodes.find(n => n.id === dsId);
      if (dn && positions[dragKey]) {
        dn.x = positions[dragKey].x;
        dn.y = positions[dragKey].y;
      }
    }
    if (dragKey && dragKey.startsWith('frame-')) {
      const frameId = dragKey.replace('frame-', '');
      const frame = frames.find(f => f.id === frameId);
      if (frame && positions[dragKey]) {
        frame.x = positions[dragKey].x;
        frame.y = positions[dragKey].y;
      }
    }
    if (dragKey && dragKey.startsWith('marker-')) {
      const mId = dragKey.replace('marker-', '');
      const m = markers.find(n => n.id === mId);
      if (m && positions[dragKey]) {
        m.x = positions[dragKey].x;
        m.y = positions[dragKey].y;
      }
    }
    if (dragKey && dragKey.startsWith('file-')) {
      const fId = dragKey.replace('file-', '');
      const fn = fileNodes.find(n => n.id === fId);
      if (fn && positions[dragKey]) {
        fn.x = positions[dragKey].x;
        fn.y = positions[dragKey].y;
      }
    }

    dragTarget = null;
    dragKey = null;
    saveCanvas();
    return;
  }
  isPanning = false;
  document.body.classList.remove('panning');
  document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'auto');
});

// ── Zoom ────────────────────────────────────
document.addEventListener('wheel', (e) => {
  if (e.target.closest('#toolbar') || e.target.closest('#titlebar') || e.target.closest('.file-editor')) return;
  e.preventDefault();
  const delta = -e.deltaY * 0.001;
  zoomTo(scale * (1 + delta), e.clientX, e.clientY);
}, { passive: false });

// ── Double-click to fit ─────────────────────
document.addEventListener('dblclick', (e) => {
  if (e.target.closest('#toolbar') || e.target.closest('#titlebar') || e.target.closest('.artboard-frame') || e.target.closest('.note-wrapper') || e.target.closest('.marker-wrapper') || e.target.closest('.design-node') || e.target.closest('.standalone-frame') || e.target.closest('.file-node')) return;
  fitAll();
});

// ── Keyboard shortcuts ──────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (clipActive) { deactivateClipMode(); return; }
    if (noteMode) { toggleNoteMode(); return; }
    if (markerMode) { toggleMarkerMode(); return; }
    if (promptPanel.style.display !== 'none') { promptPanel.style.display = 'none'; return; }
    if (addDropdown.classList.contains('visible')) { closeAddDropdown(); return; }
  }
  // Don't fire shortcuts when typing in inputs
  if (e.target.matches('input, textarea, [contenteditable]')) return;
  if (e.key === 'p' && !e.metaKey && !e.ctrlKey && !popoverOpen) { addFileNode(); return; }
  if (e.key === 'f' && !e.metaKey && !e.ctrlKey && !popoverOpen) { addFrame(); return; }
  if (e.key === 'n' && !e.metaKey && !e.ctrlKey && !popoverOpen) { toggleNoteMode(); return; }
  if (e.key === 'm' && !e.metaKey && !e.ctrlKey && !popoverOpen) { toggleMarkerMode(); return; }
  if (e.key === 'u' && !e.metaKey && !e.ctrlKey && !popoverOpen) { addUrl(); return; }
  if (e.key === '0' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomTo(1); }
  if (e.key === '1' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); fitAll(); }
  if (e.key === '=' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomTo(scale + 0.1); }
  if (e.key === '-' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomTo(scale - 0.1); }
});

// ── Minimap ─────────────────────────────────
function updateMinimap() {
  const items = computeLayout().filter(i => i.type === 'artboard');

  // Apply stored positions to artboards
  items.forEach(ab => {
    const key = `artboard-${ab.branchIdx}-${ab.screenIdx}`;
    if (positions[key]) { ab.x = positions[key].x; ab.y = positions[key].y; }
  });

  if (items.length === 0 && notes.length === 0 && designNodes.length === 0 && frames.length === 0 && fileNodes.length === 0) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  items.forEach(ab => {
    if (ab.x < minX) minX = ab.x;
    if (ab.y < minY) minY = ab.y;
    if (ab.x + ab.width > maxX) maxX = ab.x + ab.width;
    if (ab.y + ab.height > maxY) maxY = ab.y + ab.height;
  });

  notes.forEach(n => {
    const nx = positions[`note-${n.id}`]?.x ?? n.x;
    const ny = positions[`note-${n.id}`]?.y ?? n.y;
    const nw = n.width || 220;
    if (nx < minX) minX = nx;
    if (ny < minY) minY = ny;
    if (nx + nw > maxX) maxX = nx + nw;
    if (ny + 160 > maxY) maxY = ny + 160;
  });

  designNodes.forEach(dn => {
    const dx = positions[`ds-${dn.id}`]?.x ?? dn.x;
    const dy = positions[`ds-${dn.id}`]?.y ?? dn.y;
    if (dx < minX) minX = dx;
    if (dy < minY) minY = dy;
    if (dx + (dn.width || 380) > maxX) maxX = dx + (dn.width || 380);
    if (dy + 300 > maxY) maxY = dy + 300;
  });

  frames.forEach(f => {
    const fx = positions[`frame-${f.id}`]?.x ?? f.x;
    const fy = positions[`frame-${f.id}`]?.y ?? f.y;
    if (fx < minX) minX = fx;
    if (fy < minY) minY = fy;
    if (fx + f.width > maxX) maxX = fx + f.width;
    if (fy + f.height > maxY) maxY = fy + f.height;
  });

  fileNodes.forEach(fn => {
    const fnx = positions[`file-${fn.id}`]?.x ?? fn.x;
    const fny = positions[`file-${fn.id}`]?.y ?? fn.y;
    if (fnx < minX) minX = fnx;
    if (fny < minY) minY = fny;
    if (fnx + fn.width > maxX) maxX = fnx + fn.width;
    if (fny + fn.height > maxY) maxY = fny + fn.height;
  });

  if (minX === Infinity) return;

  const padding = 100;
  minX -= padding; minY -= padding;
  maxX += padding; maxY += padding;
  const contentW = maxX - minX;
  const contentH = maxY - minY;
  const mmW = 180;
  const mmH = 120;
  const mmScale = Math.min(mmW / contentW, mmH / contentH);

  let html = '';

  items.forEach(ab => {
    const x = (ab.x - minX) * mmScale;
    const y = (ab.y - minY) * mmScale;
    const w = ab.width * mmScale;
    const h = ab.height * mmScale;
    html += `<div class="minimap-artboard" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;"></div>`;
  });

  notes.forEach(n => {
    const nx = positions[`note-${n.id}`]?.x ?? n.x;
    const ny = positions[`note-${n.id}`]?.y ?? n.y;
    const x = (nx - minX) * mmScale;
    const y = (ny - minY) * mmScale;
    html += `<div class="minimap-note" style="left:${x}px;top:${y}px;"></div>`;
  });

  designNodes.forEach(dn => {
    const dx = positions[`ds-${dn.id}`]?.x ?? dn.x;
    const dy = positions[`ds-${dn.id}`]?.y ?? dn.y;
    const x = (dx - minX) * mmScale;
    const y = (dy - minY) * mmScale;
    const w = (dn.width || 380) * mmScale;
    const h = 200 * mmScale;
    html += `<div class="minimap-design-node" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;"></div>`;
  });

  frames.forEach(f => {
    const fx = positions[`frame-${f.id}`]?.x ?? f.x;
    const fy = positions[`frame-${f.id}`]?.y ?? f.y;
    const x = (fx - minX) * mmScale;
    const y = (fy - minY) * mmScale;
    const w = f.width * mmScale;
    const h = f.height * mmScale;
    html += `<div class="minimap-artboard" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;"></div>`;
  });

  fileNodes.forEach(fn => {
    const fnx = positions[`file-${fn.id}`]?.x ?? fn.x;
    const fny = positions[`file-${fn.id}`]?.y ?? fn.y;
    const x = (fnx - minX) * mmScale;
    const y = (fny - minY) * mmScale;
    const w = fn.width * mmScale;
    const h = fn.height * mmScale;
    html += `<div class="minimap-file-node" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;"></div>`;
  });

  const vpLeft = (-panX / scale - minX) * mmScale;
  const vpTop = (-panY / scale - minY) * mmScale;
  const vpW = (window.innerWidth / scale) * mmScale;
  const vpH = (window.innerHeight / scale) * mmScale;
  html += `<div id="minimap-viewport" style="left:${vpLeft}px;top:${vpTop}px;width:${vpW}px;height:${vpH}px;"></div>`;

  minimap.innerHTML = html;
}

// ── Screen Clipper ──────────────────────
let clipActive = false;
let clipStream = null;
let clipStartX = 0;
let clipStartY = 0;
let clipDragging = false;

const clipSelection = document.getElementById('clip-selection');
const clipBtn = document.getElementById('clip-btn');

function toggleClipMode() {
  if (clipActive) {
    deactivateClipMode();
  } else {
    activateClipMode();
  }
}

async function activateClipMode() {
  if (!clipStream || !clipStream.active) {
    try {
      clipStream = await navigator.mediaDevices.getDisplayMedia({
        video: { displaySurface: 'browser' },
        preferCurrentTab: true,
      });
      clipStream.getVideoTracks()[0].addEventListener('ended', () => {
        clipStream = null;
        if (clipActive) deactivateClipMode();
      });
    } catch (err) {
      showClipToast('Screen capture not available — try Cmd+Shift+4 instead', true);
      return;
    }
  }

  clipActive = true;
  document.body.classList.add('clip-mode');
  clipBtn.classList.add('active');
  document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'none');

  document.addEventListener('mousedown', onClipMouseDown);
  document.addEventListener('mousemove', onClipMouseMove);
  document.addEventListener('mouseup', onClipMouseUp);
}

function deactivateClipMode() {
  clipActive = false;
  clipDragging = false;
  document.body.classList.remove('clip-mode');
  clipBtn.classList.remove('active');
  clipSelection.classList.remove('visible');
  document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'auto');

  document.removeEventListener('mousedown', onClipMouseDown);
  document.removeEventListener('mousemove', onClipMouseMove);
  document.removeEventListener('mouseup', onClipMouseUp);
}

function onClipMouseDown(e) {
  if (e.target.closest('#toolbar') || e.target.closest('#titlebar') || e.target.closest('#minimap') || e.target.closest('#prompt-panel') || e.target.closest('#add-dropdown')) return;
  e.preventDefault();
  clipStartX = e.clientX;
  clipStartY = e.clientY;
  clipDragging = true;
  clipSelection.style.left = clipStartX + 'px';
  clipSelection.style.top = clipStartY + 'px';
  clipSelection.style.width = '0px';
  clipSelection.style.height = '0px';
  clipSelection.classList.add('visible');
  document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'none');
}

function onClipMouseMove(e) {
  if (!clipDragging) return;
  const x = Math.min(e.clientX, clipStartX);
  const y = Math.min(e.clientY, clipStartY);
  const w = Math.abs(e.clientX - clipStartX);
  const h = Math.abs(e.clientY - clipStartY);
  clipSelection.style.left = x + 'px';
  clipSelection.style.top = y + 'px';
  clipSelection.style.width = w + 'px';
  clipSelection.style.height = h + 'px';
}

function onClipMouseUp(e) {
  if (!clipDragging) return;
  clipDragging = false;
  document.querySelectorAll('.artboard-frame iframe').forEach(f => f.style.pointerEvents = 'auto');

  const x = Math.min(e.clientX, clipStartX);
  const y = Math.min(e.clientY, clipStartY);
  const w = Math.abs(e.clientX - clipStartX);
  const h = Math.abs(e.clientY - clipStartY);

  if (w < 10 || h < 10) {
    clipSelection.classList.remove('visible');
    return;
  }

  captureClip({ x, y, width: w, height: h });
}

async function captureClip(rect) {
  clipSelection.classList.remove('visible');
  await new Promise(r => setTimeout(r, 120));

  try {
    const track = clipStream.getVideoTracks()[0];
    let bitmap;

    if (typeof ImageCapture !== 'undefined') {
      const imageCapture = new ImageCapture(track);
      bitmap = await imageCapture.grabFrame();
    } else {
      const video = document.createElement('video');
      video.srcObject = clipStream;
      video.muted = true;
      video.play();
      await new Promise(r => { video.onloadeddata = r; });
      bitmap = await createImageBitmap(video);
      video.srcObject = null;
    }

    const scaleX = bitmap.width / window.innerWidth;
    const scaleY = bitmap.height / window.innerHeight;
    const cropX = Math.round(Math.max(0, rect.x * scaleX));
    const cropY = Math.round(Math.max(0, rect.y * scaleY));
    const cropW = Math.round(Math.min(rect.width * scaleX, bitmap.width - cropX));
    const cropH = Math.round(Math.min(rect.height * scaleY, bitmap.height - cropY));

    const canvasRect = {
      x: (rect.x - panX) / scale,
      y: (rect.y - panY) / scale,
      width: rect.width / scale,
      height: rect.height / scale,
    };

    const artboards = computeLayout().filter(item => {
      if (item.type !== 'artboard') return false;
      // Apply stored positions for accurate overlap detection
      const key = `artboard-${item.branchIdx}-${item.screenIdx}`;
      if (positions[key]) { item.x = positions[key].x; item.y = positions[key].y; }
      return !(item.x + item.width < canvasRect.x ||
               item.x > canvasRect.x + canvasRect.width ||
               item.y + item.height < canvasRect.y ||
               item.y > canvasRect.y + canvasRect.height);
    });

    const browserName = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent)
      ? 'Safari' : /Chrome/.test(navigator.userAgent) ? 'Chrome' : 'Browser';
    const zoomPct = Math.round(scale * 100);

    let captionText;
    if (artboards.length === 0) {
      captionText = `(no artboard)  @${zoomPct}%  ${browserName}`;
    } else {
      captionText = artboards.map(ab =>
        `⌥ ${ab.branch}  :${ab.port}  ${ab.route}  ${ab.name} ${ab.width}×${ab.height}  @${zoomPct}%  ${browserName}`
      ).join('   ');
    }

    const captionScale = scaleY || 1;
    const captionHeight = Math.round(32 * captionScale);
    const fontSize = Math.round(12 * captionScale);
    const captionPadding = Math.round(10 * captionScale);

    const outCanvas = document.createElement('canvas');
    outCanvas.width = cropW;
    outCanvas.height = cropH + captionHeight;
    const ctx = outCanvas.getContext('2d');

    ctx.drawImage(bitmap, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, cropH, cropW, captionHeight);
    ctx.fillStyle = '#ffffff';
    ctx.font = `${fontSize}px "JetBrains Mono", "SF Mono", "Fira Code", monospace`;
    ctx.textBaseline = 'middle';
    ctx.fillText(captionText, captionPadding, cropH + captionHeight / 2);

    const blob = await new Promise(r => outCanvas.toBlob(r, 'image/png'));
    try {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
    } catch (clipErr) {
      console.warn('Clipboard write failed:', clipErr);
    }

    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const browser = browserName.toLowerCase();
    const filename = artboards.length > 0
      ? `clip-${artboards[0].branch}-${artboards[0].name.toLowerCase()}-${browser}-${timestamp}.png`
      : `clip-${browser}-${timestamp}.png`;
    const downloadUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = downloadUrl;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(downloadUrl);

    showClipToast('Clipped → Downloads');
    bitmap.close();
  } catch (err) {
    console.error('Clip capture failed:', err);
    showClipToast('Clip failed — check console', true);
  }

  deactivateClipMode();
}

function showClipToast(message, isError = false) {
  copyToast.textContent = message;
  copyToast.classList.toggle('error', isError);
  copyToast.classList.add('visible');
  setTimeout(() => {
    copyToast.classList.remove('visible');
    setTimeout(() => {
      copyToast.textContent = 'Copied!';
      copyToast.classList.remove('error');
    }, 300);
  }, 2000);
}

// ── Popover (shared for name / route / dims editing) ─
const popover = document.getElementById('popover');
let popoverCleanup = null;
let popoverOpen = false;

canvas.addEventListener('click', (e) => {
  const el = e.target.closest('[data-pop]');
  if (!el) return;
  e.stopPropagation();

  const type = el.dataset.pop;
  if (type === 'note-width') {
    openNotePopover(el, el.dataset.noteId);
    return;
  }
  if (type === 'frame-name') {
    openFrameNamePopover(el, el.dataset.frameId);
    return;
  }
  if (type === 'frame-dims') {
    openFrameDimsPopover(el, el.dataset.frameId);
    return;
  }
  if (type === 'file-dims') {
    openFileDimsPopover(el, el.dataset.fileId);
    return;
  }

  const bIdx = parseInt(el.dataset.b);
  const sIdx = parseInt(el.dataset.s);
  const screen = branches[bIdx]?.screens[sIdx];
  if (!screen) return;

  openPopover(el, type, screen);
});

function openPopover(anchorEl, type, screen) {
  hidePopover();
  const rect = anchorEl.getBoundingClientRect();

  if (type === 'name') {
    popover.innerHTML = `<input id="pop-input" type="text" value="${screen.name}" style="width:180px" />`;
    showAndPosition(rect);
    const input = document.getElementById('pop-input');
    input.focus();
    input.select();
    bindSingleInput(input, (val) => {
      if (val && val !== screen.name) { screen.name = val; render(); saveCanvas(); }
    });

  } else if (type === 'route') {
    popover.innerHTML = `<input id="pop-input" type="text" value="${screen.route}" style="width:240px;font-family:var(--mono)" />`;
    showAndPosition(rect);
    const input = document.getElementById('pop-input');
    input.focus();
    input.select();
    bindSingleInput(input, (val) => {
      if (val && val !== screen.route) { screen.route = val; render(); saveCanvas(); }
    });

  } else if (type === 'dims') {
    popover.innerHTML = `
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="pop-w" type="number" value="${screen.width}" style="width:70px;font-family:var(--mono)" />
        <span style="color:var(--text-muted)">×</span>
        <input id="pop-h" type="number" value="${screen.height}" style="width:70px;font-family:var(--mono)" />
      </div>`;
    showAndPosition(rect);
    const wInput = document.getElementById('pop-w');
    const hInput = document.getElementById('pop-h');
    wInput.focus();
    wInput.select();
    bindDualInput(wInput, hInput, (w, h) => {
      const newW = parseInt(w) || screen.width;
      const newH = parseInt(h) || screen.height;
      if (newW !== screen.width || newH !== screen.height) {
        screen.width = newW; screen.height = newH; render(); saveCanvas();
      }
    });
  }
}

function openNotePopover(anchorEl, noteId) {
  hidePopover();
  const note = notes.find(n => n.id === noteId);
  if (!note) return;
  const rect = anchorEl.getBoundingClientRect();
  popover.innerHTML = `<input id="pop-input" type="number" value="${note.width || 220}" style="width:80px;font-family:var(--mono)" />`;
  showAndPosition(rect);
  const input = document.getElementById('pop-input');
  input.focus();
  input.select();
  bindSingleInput(input, (val) => {
    const newW = parseInt(val) || 220;
    if (newW !== note.width) { note.width = newW; render(); saveCanvas(); }
  });
}

function openFrameNamePopover(anchorEl, frameId) {
  hidePopover();
  const frame = frames.find(f => f.id === frameId);
  if (!frame) return;
  const rect = anchorEl.getBoundingClientRect();
  popover.innerHTML = `<input id="pop-url" type="text" value="${frame.url}" style="width:320px;font-family:var(--mono)" />`;
  showAndPosition(rect);
  const input = document.getElementById('pop-url');
  input.focus();
  input.select();
  bindSingleInput(input, (val) => {
    if (val && val !== frame.url) {
      frame.url = val;
      try { frame.label = new URL(val).hostname; } catch { frame.label = val; }
      if (val.match(/^http:\/\/localhost:(\d+)/)) {
        const m = val.match(/^http:\/\/localhost:(\d+)(.*)/);
        frame.label = `:${m[1]}${m[2] || '/'}`;
      }
      render(); saveCanvas();
    }
  });
}

function openFrameDimsPopover(anchorEl, frameId) {
  hidePopover();
  const frame = frames.find(f => f.id === frameId);
  if (!frame) return;
  const rect = anchorEl.getBoundingClientRect();
  popover.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;">
      <input id="pop-w" type="number" value="${frame.width}" style="width:70px;font-family:var(--mono)" />
      <span style="color:var(--text-muted)">×</span>
      <input id="pop-h" type="number" value="${frame.height}" style="width:70px;font-family:var(--mono)" />
    </div>`;
  showAndPosition(rect);
  const wInput = document.getElementById('pop-w');
  const hInput = document.getElementById('pop-h');
  wInput.focus();
  wInput.select();
  bindDualInput(wInput, hInput, (w, h) => {
    const newW = parseInt(w) || frame.width;
    const newH = parseInt(h) || frame.height;
    if (newW !== frame.width || newH !== frame.height) {
      frame.width = newW; frame.height = newH; render(); saveCanvas();
    }
  });
}

function openFileDimsPopover(anchorEl, fileId) {
  hidePopover();
  const fileNode = fileNodes.find(fn => fn.id === fileId);
  if (!fileNode) return;
  const rect = anchorEl.getBoundingClientRect();
  popover.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;">
      <input id="pop-w" type="number" value="${fileNode.width}" style="width:70px;font-family:var(--mono)" />
      <span style="color:var(--text-muted)">×</span>
      <input id="pop-h" type="number" value="${fileNode.height}" style="width:70px;font-family:var(--mono)" />
    </div>`;
  showAndPosition(rect);
  const wInput = document.getElementById('pop-w');
  const hInput = document.getElementById('pop-h');
  wInput.focus();
  wInput.select();
  bindDualInput(wInput, hInput, (w, h) => {
    const newW = parseInt(w) || fileNode.width;
    const newH = parseInt(h) || fileNode.height;
    if (newW !== fileNode.width || newH !== fileNode.height) {
      fileNode.width = newW; fileNode.height = newH; render(); saveCanvas();
    }
  });
}

function showAndPosition(anchorRect) {
  popover.classList.add('visible');
  popoverOpen = true;
  requestAnimationFrame(() => {
    const popRect = popover.getBoundingClientRect();
    let left = anchorRect.left + anchorRect.width / 2 - popRect.width / 2;
    let top = anchorRect.top - popRect.height - 10;
    left = Math.max(8, Math.min(left, window.innerWidth - popRect.width - 8));
    if (top < 8) top = anchorRect.bottom + 10;
    popover.style.left = left + 'px';
    popover.style.top = top + 'px';
  });
}

function bindSingleInput(input, onConfirm) {
  let confirmed = false;
  const confirm = () => {
    if (confirmed) return;
    confirmed = true;
    onConfirm(input.value.trim());
    hidePopover();
  };
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') confirm();
    if (e.key === 'Escape') { confirmed = true; hidePopover(); }
  });
  input.addEventListener('blur', () => setTimeout(confirm, 120));
}

function bindDualInput(inputA, inputB, onConfirm) {
  let confirmed = false;
  let blurTimeout;
  const confirm = () => {
    if (confirmed) return;
    confirmed = true;
    onConfirm(inputA.value, inputB.value);
    hidePopover();
  };
  const onKey = (e) => {
    if (e.key === 'Enter') confirm();
    if (e.key === 'Escape') { confirmed = true; hidePopover(); }
  };
  inputA.addEventListener('keydown', onKey);
  inputB.addEventListener('keydown', onKey);
  const onBlur = () => { blurTimeout = setTimeout(confirm, 150); };
  const onFocus = () => clearTimeout(blurTimeout);
  inputA.addEventListener('blur', onBlur);
  inputB.addEventListener('blur', onBlur);
  inputA.addEventListener('focus', onFocus);
  inputB.addEventListener('focus', onFocus);
  popoverCleanup = () => clearTimeout(blurTimeout);
}

function hidePopover() {
  if (popoverCleanup) { popoverCleanup(); popoverCleanup = null; }
  popover.classList.remove('visible');
  popover.innerHTML = '';
  popoverOpen = false;
}

// Click outside to close popover
document.addEventListener('mousedown', (e) => {
  if (popoverOpen && !popover.contains(e.target) && !e.target.closest('[data-pop]')) {
    hidePopover();
  }
});

// ── Canvas Switcher ─────────────────────────
const canvasSwitcher = document.getElementById('canvas-switcher');
const canvasDropdown = document.getElementById('canvas-dropdown');
const titlebarSubtitle = document.getElementById('titlebar-subtitle');

function toggleCanvasDropdown() {
  if (canvasDropdown.classList.contains('visible')) {
    closeCanvasDropdown();
  } else {
    openCanvasDropdown();
  }
}

async function openCanvasDropdown() {
  canvasSwitcher.classList.add('open');

  let canvases = [];
  try {
    const res = await fetch('/api/canvases');
    canvases = await res.json();
  } catch (err) {
    // Server might not be running
  }

  let html = '';
  canvases.forEach(c => {
    const isActive = c.id === currentCanvasId;
    html += `<button class="dropdown-option${isActive ? ' active' : ''}" onclick="switchCanvas('${c.id}')">${c.name}</button>`;
  });
  html += `<button class="dropdown-option new-canvas" onclick="createNewCanvas()">+ New Canvas</button>`;
  canvasDropdown.innerHTML = html;

  const rect = canvasSwitcher.getBoundingClientRect();
  canvasDropdown.style.left = rect.left + 'px';
  canvasDropdown.style.top = (rect.bottom + 6) + 'px';
  canvasDropdown.classList.add('visible');
}

function closeCanvasDropdown() {
  canvasSwitcher.classList.remove('open');
  canvasDropdown.classList.remove('visible');
}

document.addEventListener('mousedown', (e) => {
  if (canvasDropdown.classList.contains('visible') &&
      !canvasDropdown.contains(e.target) &&
      !canvasSwitcher.contains(e.target)) {
    closeCanvasDropdown();
  }
});

function switchCanvas(canvasId) {
  closeCanvasDropdown();
  const url = new URL(window.location);
  url.searchParams.set('canvas', canvasId);
  window.location.href = url.toString();
}

function createNewCanvas() {
  closeCanvasDropdown();
  const name = prompt('Canvas name (e.g. "dashboard-breakpoints"):');
  if (!name) return;
  const canvasId = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (!canvasId) return;

  currentCanvasId = canvasId;
  currentCanvasDisplayName = name;
  branches.length = 0;
  branches.push({
    branch: 'main',
    port: 3000,
    screens: defaultScreens.map(s => ({ ...s })),
  });
  // Clear canvas-specific state
  Object.keys(positions).forEach(k => delete positions[k]);
  notes.length = 0;
  frames.length = 0;
  designNodes.length = 0;
  markers.length = 0;
  fileNodes.length = 0;

  titlebarSubtitle.textContent = name;

  saveCanvas().then(() => {
    const url = new URL(window.location);
    url.searchParams.set('canvas', canvasId);
    history.replaceState(null, '', url.toString());
  });
  render();
  fitAll();
}

// ── Persistence ─────────────────────────────
let currentCanvasId = null;
let currentCanvasDisplayName = 'Live Canvas';
let saveTimeout = null;

function saveCanvas() {
  if (!currentCanvasId) return Promise.resolve();

  return new Promise((resolve) => {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => {
      const payload = {
        name: currentCanvasDisplayName,
        branches: branches.map(v => ({
          branch: v.branch,
          port: v.port,
          screens: v.screens.map(s => ({
            name: s.name,
            route: s.route,
            width: s.width,
            height: s.height,
          })),
        })),
        positions: { ...positions },
        notes: notes.map(n => ({ ...n })),
        frames: frames.map(f => ({ ...f })),
        designNodes: designNodes.map(dn => ({ ...dn })),
        markers: markers.map(m => ({ ...m })),
        fileNodes: fileNodes.map(fn => ({ ...fn })),
      };
      try {
        await fetch(`/api/canvases/${currentCanvasId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const dot = document.querySelector('.status-dot');
        dot.style.background = 'var(--accent)';
        setTimeout(() => { dot.style.background = 'var(--green)'; }, 600);
      } catch (err) {
        console.warn('Save failed:', err);
      }
      resolve();
    }, 300);
  });
}

async function loadCanvas() {
  const params = new URLSearchParams(window.location.search);
  const canvasParam = params.get('canvas');

  if (!canvasParam) {
    render();
    fitAll();
    return;
  }

  currentCanvasId = canvasParam;

  try {
    const res = await fetch(`/api/canvases/${canvasParam}`);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    currentCanvasDisplayName = data.name || canvasParam;
    titlebarSubtitle.textContent = currentCanvasDisplayName;

    // Load branches (backward compat: accept "variants" key from old canvases)
    branches.length = 0;
    const loadedBranches = data.branches || data.variants || [];
    loadedBranches.forEach(v => branches.push(v));

    // Load positions
    Object.keys(positions).forEach(k => delete positions[k]);
    Object.assign(positions, data.positions || {});

    // Load notes
    notes.length = 0;
    (data.notes || []).forEach(n => notes.push(n));

    // Load standalone frames
    frames.length = 0;
    (data.frames || []).forEach(f => frames.push(f));

    // Load design nodes
    designNodes.length = 0;
    (data.designNodes || []).forEach(dn => designNodes.push(dn));

    // Load markers (backward compat: fall back from "number" to "text")
    markers.length = 0;
    (data.markers || []).forEach(m => {
      if (!m.text && m.number != null) m.text = String(m.number);
      markers.push(m);
    });

    // Load file nodes (clean stored paths for backward compat)
    fileNodes.length = 0;
    (data.fileNodes || []).forEach(fn => {
      if (fn.source) fn.source = cleanPath(fn.source);
      fileNodes.push(fn);
    });

    render();
    fitAll();
  } catch (err) {
    currentCanvasDisplayName = canvasParam;
    titlebarSubtitle.textContent = canvasParam;
    render();
    fitAll();
  }
}

// ── Server check ────────────────────────────
const serverBanner = document.getElementById('server-banner');

async function checkServer() {
  if (location.protocol === 'file:') {
    showServerBanner();
    return;
  }
  try {
    const res = await fetch('/api/canvases', { method: 'GET' });
    if (!res.ok) throw new Error();
  } catch {
    showServerBanner();
  }
}

function showServerBanner() {
  serverBanner.classList.add('visible');
}

function dismissBanner() {
  serverBanner.classList.remove('visible');
}

function copyServerCmd() {
  const cmd = document.getElementById('server-cmd').textContent;
  navigator.clipboard.writeText(cmd).then(() => {
    showClipToast('Copied!');
  });
}

// ── Init ────────────────────────────────────
loadCanvas();
checkServer();
window.addEventListener('resize', () => { updateMinimap(); });
</script>
