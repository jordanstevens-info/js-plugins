<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<script>document.write('<link rel="stylesheet" href="canvas.css?t=' + Date.now() + '">')</script>
<style>
  /* All base styles are in canvas.css — add page-specific overrides here */
</style>
</head>
<body>

<!-- Title bar -->
<div id="titlebar">
  <div id="titlebar-left">
    <svg id="titlebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 13V7.5C21 6.30653 21.0001 4.68198 21.0001 3C19.318 3 17.6935 3 16.5 3H7.5C6.30653 3 4.31805 3 3 3C3.00013 4.18198 3 6.30653 3 7.5V16.5C3 17.6935 3 19.318 3 21C4.68198 21 6.30653 21 7.5 21H13" stroke="currentColor" stroke-width="1.5"/>
      <path d="M3 9H21" stroke="currentColor" stroke-width="1.5"/>
      <path d="M6.4998 7.1998C7.16255 7.1998 7.6998 6.66255 7.6998 5.9998C7.6998 5.33706 7.16255 4.7998 6.4998 4.7998C5.83706 4.7998 5.2998 5.33706 5.2998 5.9998C5.2998 6.66255 5.83706 7.1998 6.4998 7.1998Z" fill="currentColor"/>
      <path d="M15 12V20.5L17.5 18L19.5 21.5L21 20.5L19 17L22 16.5L15 12Z" fill="currentColor"/>
    </svg>
    <span id="titlebar-title">Live Canvas</span>
    <div class="status-dot"></div>
    <div id="canvas-switcher" onclick="toggleCanvasDropdown()">
      <span id="titlebar-subtitle">Live Canvas</span>
      <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg>
    </div>
  </div>
  <div id="titlebar-right">
    <button class="titlebar-btn" id="add-btn" onclick="toggleAddDropdown()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Add
    </button>
    <button class="titlebar-btn" id="prompt-btn" onclick="togglePromptPanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Prompt
    </button>
    <button class="titlebar-btn" id="clip-btn" onclick="toggleClipMode()" title="Clip region (Esc to cancel)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg>
      Clip
    </button>
  </div>
</div>

<!-- Prompt panel (hidden by default) -->
<div id="prompt-panel" style="display:none">
  <div class="bf-header">
    <span class="bf-title">Canvas Prompt</span>
    <button class="bf-close" onclick="togglePromptPanel()" title="Close">&times;</button>
  </div>
  <div class="bf-field">
    <label for="prompt-desc">What do you want to do?</label>
    <textarea id="prompt-desc" placeholder="Describe what you want — add a branch, create viewports, tweak tokens, add file nodes…"></textarea>
  </div>
  <button class="bf-copy-btn" onclick="copyCanvasPrompt()">Copy Prompt</button>
</div>

<!-- Add dropdown -->
<div id="add-dropdown">
  <button class="dropdown-option" onclick="closeAddDropdown();addFileNode()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Filepath <span class="shortcut-hint">P</span>
  </button>
  <button class="dropdown-option" onclick="closeAddDropdown();addFrame()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Frame <span class="shortcut-hint">F</span>
  </button>
  <button class="dropdown-option" onclick="closeAddDropdown();toggleMarkerMode()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    Marker <span class="shortcut-hint">M</span>
  </button>
  <button class="dropdown-option" onclick="closeAddDropdown();toggleNoteMode()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.5 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8.5L15.5 3z"/><path d="M14 3v6h6"/></svg>
    Note <span class="shortcut-hint">N</span>
  </button>
  <button class="dropdown-option" onclick="closeAddDropdown();addUrl()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
    URL / Embed <span class="shortcut-hint">U</span>
  </button>
</div>

<!-- Copy toast -->
<div id="copy-toast">Copied!</div>

<!-- Server banner -->
<div id="server-banner">
  <span>Canvas server not running — persistence disabled. Run:</span>
  <code id="server-cmd">python3 serve.py</code>
  <button onclick="copyServerCmd()">Copy command</button>
  <span>then open</span>
  <a href="http://localhost:8888/live-canvas.html">localhost:8888/live-canvas.html</a>
  <button class="banner-dismiss" onclick="dismissBanner()">&times;</button>
</div>

<!-- Hint -->
<div id="hint">Scroll to zoom · Click + drag to pan · Double-click to fit</div>

<!-- Canvas -->
<div id="canvas"></div>

<!-- Popover (shared for name/dims editing) -->
<div id="popover"></div>

<!-- Canvas switcher dropdown -->
<div id="canvas-dropdown"></div>

<!-- Clip selection overlay -->
<div id="clip-selection"></div>

<!-- Minimap -->
<div id="minimap"></div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="tb-btn" onclick="zoomTo(scale - 0.1)" title="Zoom out">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
  </button>
  <div id="zoom-display" onclick="zoomTo(1)" title="Reset to 100%">100%</div>
  <button class="tb-btn" onclick="zoomTo(scale + 0.1)" title="Zoom in">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="fitAll()" title="Fit all artboards">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 3H3v6M15 21h6v-6M9 21H3v-6"/><path d="M21 3l-7 7M3 3l7 7M21 21l-7-7M3 21l7-7"/></svg>
  </button>
</div>

<script>
// ── State ───────────────────────────────────
let scale = 0.45;
let panX = 0;
let panY = 0;
let isPanning = false;
let startX = 0;
let startY = 0;

// Drag state
let isDragging = false;
let dragTarget = null;
let dragKey = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
const positions = {};

// Note state
let noteMode = false;
const notes = [];
let noteIdCounter = 0;

// Standalone frames (Port/URL)
const frames = [];
let frameIdCounter = 0;
function generateFrameId() { return `frame-${Date.now()}-${frameIdCounter++}`; }

// Design nodes
const designNodes = [];

// Callout markers
const markers = [];
let markerIdCounter = 0;
function generateMarkerId() { return `marker-${Date.now()}-${markerIdCounter++}`; }

// File nodes
const fileNodes = [];
let fileNodeIdCounter = 0;
function generateFileNodeId() { return `file-${Date.now()}-${fileNodeIdCounter++}`; }

const IMAGE_EXTS = new Set(['.png', '.jpg', '.jpeg', '.gif', '.svg', '.webp', '.ico', '.bmp']);
const VIDEO_EXTS = new Set(['.mov', '.mp4', '.webm', '.ogg', '.m4v', '.avi']);
const AUDIO_EXTS = new Set(['.mp3', '.wav', '.aac', '.m4a', '.flac']);

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

const canvas = document.getElementById('canvas');
const zoomDisplay = document.getElementById('zoom-display');
const minimap = document.getElementById('minimap');
const hint = document.getElementById('hint');
const addDropdown = document.getElementById('add-dropdown');

setTimeout(() => hint.classList.add('hidden'), 4000);

// ── Git branch icon SVG ─────────────────────
const branchIconSvg = `<svg class="branch-pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v12"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>`;

// ── Branch / artboard data model ────────────
const SCREEN_GAP = 100;
const BRANCH_GAP = 200;
const BRANCH_LABEL_HEIGHT = 125;

const defaultScreens = [
  { name: 'Desktop',  route: '/', width: 1440, height: 900 },
  { name: 'Tablet',   route: '/', width: 768,  height: 1024 },
  { name: 'Mobile',   route: '/', width: 390,  height: 844 },
];

const branches = [
  {
    branch: 'main',
    port: 3000,
    screens: defaultScreens.map(s => ({ ...s })),
  },
];

// ── Helpers ──────────────────────────────────
function screenToCanvas(sx, sy) {
  return { x: (sx - panX) / scale, y: (sy - panY) / scale };
}

function generateNoteId() {
  return `note-${Date.now()}-${noteIdCounter++}`;
}

// ── Layout calculation ──────────────────────
function computeLayout() {
  const items = [];
  let currentY = 0;

  branches.forEach((branch, bIdx) => {
    items.push({
      type: 'label',
      branch: branch.branch,
      port: branch.port,
      x: 0,
      y: currentY,
      branchIdx: bIdx,
    });

    currentY += BRANCH_LABEL_HEIGHT;

    let currentX = 0;
    let maxHeight = 0;

    branch.screens.forEach((screen, sIdx) => {
      items.push({
        type: 'artboard',
        name: screen.name,
        url: `http://localhost:${branch.port}${screen.route}`,
        width: screen.width,
        height: screen.height,
        x: currentX,
        y: currentY,
        branch: branch.branch,
        port: branch.port,
        route: screen.route,
        branchIdx: bIdx,
        screenIdx: sIdx,
      });
      currentX += screen.width + SCREEN_GAP;
      if (screen.height > maxHeight) maxHeight = screen.height;
    });

    currentY += maxHeight + BRANCH_GAP;
  });

  return items;
}

// ── Render ──────────────────────────────────
function render() {
  const items = computeLayout();

  // ── Reconcile branch items ──
  // Labels: remove and recreate (cheap, no iframes).
  // Artboards: update in place to preserve iframes and avoid reload flash.
  canvas.querySelectorAll('.branch-label').forEach(el => el.remove());
  const activeArtboardKeys = new Set();

  items.forEach(item => {
    const key = item.type === 'label'
      ? `label-${item.branchIdx}`
      : `artboard-${item.branchIdx}-${item.screenIdx}`;

    if (positions[key]) {
      item.x = positions[key].x;
      item.y = positions[key].y;
    }

    if (item.type === 'label') {
      const el = document.createElement('div');
      el.className = 'branch-label';
      el.dataset.dragKey = key;
      el.style.left = item.x + 'px';
      el.style.top = item.y + 'px';
      el.innerHTML = `
        <span class="drag-grip" data-drag-handle>⠿</span>
        <div class="branch-pill">
          ${branchIconSvg}
          <span class="branch-pill-name">${item.branch}</span>
        </div>
        <div class="branch-dot"></div>
        <span class="branch-port">:${item.port}</span>
      `;
      canvas.appendChild(el);
    } else {
      activeArtboardKeys.add(key);
      let el = canvas.querySelector(`[data-drag-key="${key}"]`);

      if (el) {
        // Existing artboard — update position + labels, preserve iframe
        el.style.left = item.x + 'px';
        el.style.top = item.y + 'px';
        // Regenerate label bar (onclick handlers carry index refs that may shift)
        const labelEl = el.querySelector('.artboard-label');
        if (labelEl) {
          labelEl.innerHTML = `
            <span class="drag-grip" data-drag-handle>⠿</span>
            <span class="artboard-name clickable" data-pop="name" data-b="${item.branchIdx}" data-s="${item.screenIdx}">${item.name}</span>
            <span class="artboard-route clickable" data-pop="route" data-b="${item.branchIdx}" data-s="${item.screenIdx}">${item.route}</span>
            <span class="artboard-dims clickable" data-pop="dims" data-b="${item.branchIdx}" data-s="${item.screenIdx}">${item.width} × ${item.height}</span>
            <button class="open-tab-btn" onclick="event.stopPropagation();window.open('${item.url}','_blank')" title="Open in new tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
            <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('artboard','${item.branchIdx}',${item.screenIdx})" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
            <button class="node-delete" onclick="deleteArtboard(${item.branchIdx},${item.screenIdx})" title="Remove frame"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          `;
        }
        // Update iframe dimensions (preserve the element itself to avoid reload)
        const frameContainer = el.querySelector('.artboard-frame');
        if (frameContainer) {
          frameContainer.style.width = item.width + 'px';
          frameContainer.style.height = item.height + 'px';
          const iframe = frameContainer.querySelector('iframe');
          if (iframe) {
            if (iframe.getAttribute('src') !== item.url) iframe.src = item.url;
            iframe.width = item.width;
            iframe.height = item.height;
          }
        }
      } else {
        // New artboard — create from scratch
        el = document.createElement('div');
        el.className = 'artboard';
        el.dataset.dragKey = key;
        el.style.left = item.x + 'px';
        el.style.top = item.y + 'px';
        el.innerHTML = `
          <div class="artboard-label">
            <span class="drag-grip" data-drag-handle>⠿</span>
            <span class="artboard-name clickable" data-pop="name" data-b="${item.branchIdx}" data-s="${item.screenIdx}">${item.name}</span>
            <span class="artboard-route clickable" data-pop="route" data-b="${item.branchIdx}" data-s="${item.screenIdx}">${item.route}</span>
            <span class="artboard-dims clickable" data-pop="dims" data-b="${item.branchIdx}" data-s="${item.screenIdx}">${item.width} × ${item.height}</span>
            <button class="open-tab-btn" onclick="event.stopPropagation();window.open('${item.url}','_blank')" title="Open in new tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
            <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('artboard','${item.branchIdx}',${item.screenIdx})" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
            <button class="node-delete" onclick="deleteArtboard(${item.branchIdx},${item.screenIdx})" title="Remove frame"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          </div>
          <div class="artboard-frame" style="width:${item.width}px;height:${item.height}px;">
            <iframe
              src="${item.url}"
              width="${item.width}"
              height="${item.height}"
              loading="lazy"
            ></iframe>
          </div>
        `;
        canvas.appendChild(el);
      }
    }
  });

  // Remove orphaned artboards (e.g. a screen was deleted)
  canvas.querySelectorAll('.artboard[data-drag-key]').forEach(el => {
    if (!activeArtboardKeys.has(el.dataset.dragKey)) el.remove();
  });

  renderNotes();
  renderMarkers();
  renderDesignNodes();
  reconcileFrames();
  renderFileNodes();
  updateTransform();
  updateMinimap();
}

// ── Render notes ────────────────────────────
function renderNotes() {
  canvas.querySelectorAll('.note-wrapper').forEach(el => el.remove());
  notes.forEach((note, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'note-wrapper';
    wrapper.dataset.dragKey = `note-${note.id}`;
    wrapper.dataset.noteId = note.id;

    const nx = positions[`note-${note.id}`]?.x ?? note.x;
    const ny = positions[`note-${note.id}`]?.y ?? note.y;
    wrapper.style.left = nx + 'px';
    wrapper.style.top = ny + 'px';
    wrapper.style.width = (note.width || 220) + 'px';
    wrapper.innerHTML = `
      <div class="note-label">
        <span class="drag-grip" data-drag-handle>⠿</span>
        <span class="note-dims clickable" data-pop="note-width" data-note-id="${note.id}">${note.width || 220}px</span>
        <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('note','${note.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
        <button class="node-delete" onclick="deleteNote('${note.id}')" title="Delete note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sticky-note">
        <div class="sticky-note-text" contenteditable="true">${note.text}</div>
      </div>
    `;

    const textEl = wrapper.querySelector('.sticky-note-text');
    textEl.addEventListener('input', () => {
      note.text = textEl.innerHTML;
      saveCanvas();
    });

    canvas.appendChild(wrapper);
  });
}

// ── Render markers ──────────────────────────
function renderMarkers() {
  canvas.querySelectorAll('.marker-wrapper').forEach(el => el.remove());
  markers.forEach(marker => {
    const wrapper = document.createElement('div');
    wrapper.className = 'marker-wrapper';
    wrapper.dataset.dragKey = `marker-${marker.id}`;
    wrapper.dataset.markerId = marker.id;

    const mx = positions[`marker-${marker.id}`]?.x ?? marker.x;
    const my = positions[`marker-${marker.id}`]?.y ?? marker.y;
    wrapper.style.left = mx + 'px';
    wrapper.style.top = my + 'px';

    wrapper.innerHTML = `
      <div class="marker-flag" data-drag-handle>
        <span class="marker-text" contenteditable="true">${marker.text}</span>
        <button class="marker-close" onclick="deleteMarker('${marker.id}')">&times;</button>
      </div>
    `;

    const textEl = wrapper.querySelector('.marker-text');
    textEl.addEventListener('input', () => {
      marker.text = textEl.textContent;
      saveCanvas();
    });

    canvas.appendChild(wrapper);
  });
}

// ── Render design nodes ─────────────────────
function renderDesignNodes() {
  canvas.querySelectorAll('.design-node').forEach(el => el.remove());
  designNodes.forEach(dn => {
    const el = document.createElement('div');
    el.className = 'design-node';
    el.dataset.dragKey = `ds-${dn.id}`;
    el.style.left = (positions[`ds-${dn.id}`]?.x ?? dn.x) + 'px';
    el.style.top = (positions[`ds-${dn.id}`]?.y ?? dn.y) + 'px';

    const hasChanges = Object.keys(dn.modifications || {}).length > 0;
    let sectionsHTML = '';

    if (dn.tokens.colors) {
      let rows = '';
      for (const [name, value] of Object.entries(dn.tokens.colors)) {
        const current = (dn.modifications || {})[name] ?? value;
        const modified = (dn.modifications || {})[name] !== undefined;
        rows += `
          <div class="token-row ${modified ? 'modified' : ''}">
            <div class="token-swatch" style="background:${current}">
              <input type="color" value="${current.startsWith('#') ? current : '#000000'}"
                onchange="updateToken('${dn.id}','${name}',this.value,'${value}')" />
            </div>
            <span class="token-name">${name}</span>
            <input type="text" class="token-input token-color-input" value="${current}"
              onchange="updateToken('${dn.id}','${name}',this.value,'${value}')" />
          </div>`;
      }
      sectionsHTML += `<div class="design-node-section">
        <div class="design-node-section-title">Colors</div>${rows}</div>`;
    }

    if (dn.tokens.spacing) {
      let rows = '';
      for (const [name, value] of Object.entries(dn.tokens.spacing)) {
        const current = (dn.modifications || {})[name] ?? value;
        const modified = (dn.modifications || {})[name] !== undefined;
        const numVal = parseInt(current) || 0;
        const unit = (current.match(/[a-z%]+$/i) || ['px'])[0];
        rows += `
          <div class="token-row ${modified ? 'modified' : ''}">
            <div class="token-spacing-bar" style="width:${Math.min(numVal * 2, 80)}px"></div>
            <span class="token-name">${name}</span>
            <div class="token-controls">
              <input type="range" min="0" max="128" step="1" value="${numVal}"
                oninput="updateTokenFromSlider('${dn.id}','${name}',this.value,'${unit}','${value}')" />
              <input type="text" class="token-input" value="${current}"
                onchange="updateToken('${dn.id}','${name}',this.value,'${value}')" />
            </div>
          </div>`;
      }
      sectionsHTML += `<div class="design-node-section">
        <div class="design-node-section-title">Spacing</div>${rows}</div>`;
    }

    if (dn.tokens.typography) {
      let rows = '';
      for (const [name, value] of Object.entries(dn.tokens.typography)) {
        const current = (dn.modifications || {})[name] ?? value;
        const modified = (dn.modifications || {})[name] !== undefined;
        const numVal = parseInt(current) || 14;
        const unit = (current.match(/[a-z%]+$/i) || ['px'])[0];
        rows += `
          <div class="token-row ${modified ? 'modified' : ''}">
            <span style="font-size:${Math.min(numVal, 28)}px;color:var(--text);line-height:1;">Aa</span>
            <span class="token-name">${name}</span>
            <div class="token-controls">
              <input type="range" min="8" max="72" step="1" value="${numVal}"
                oninput="updateTokenFromSlider('${dn.id}','${name}',this.value,'${unit}','${value}')" />
              <input type="text" class="token-input" value="${current}"
                onchange="updateToken('${dn.id}','${name}',this.value,'${value}')" />
            </div>
          </div>`;
      }
      sectionsHTML += `<div class="design-node-section">
        <div class="design-node-section-title">Typography</div>${rows}</div>`;
    }

    if (dn.tokens.radius) {
      let rows = '';
      for (const [name, value] of Object.entries(dn.tokens.radius)) {
        const current = (dn.modifications || {})[name] ?? value;
        const modified = (dn.modifications || {})[name] !== undefined;
        const numVal = parseInt(current) || 0;
        const unit = (current.match(/[a-z%]+$/i) || ['px'])[0];
        rows += `
          <div class="token-row ${modified ? 'modified' : ''}">
            <div class="token-radius-preview" style="border-radius:${current} 0 0 0"></div>
            <span class="token-name">${name}</span>
            <div class="token-controls">
              <input type="range" min="0" max="48" step="1" value="${numVal}"
                oninput="updateTokenFromSlider('${dn.id}','${name}',this.value,'${unit}','${value}')" />
              <input type="text" class="token-input" value="${current}"
                onchange="updateToken('${dn.id}','${name}',this.value,'${value}')" />
            </div>
          </div>`;
      }
      sectionsHTML += `<div class="design-node-section">
        <div class="design-node-section-title">Border Radius</div>${rows}</div>`;
    }

    el.innerHTML = `
      <div class="design-node-header" data-drag-handle>
        <span class="design-node-title">Design Tokens</span>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="ghost-btn" onclick="saveTokenChanges('${dn.id}')"
            ${hasChanges ? '' : 'disabled'}>Save</button>
          <button class="ghost-btn" onclick="copyTokenChanges('${dn.id}')"
            ${hasChanges ? '' : 'disabled'}>Prompt</button>
          <button class="ghost-btn" onclick="resetTokens('${dn.id}')"
            title="Re-read values from source file">Resync</button>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('design','${dn.id}')" title="Duplicate" style="padding:0;width:22px;height:22px;margin-left:0;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="design-node-close" onclick="deleteDesignNode('${dn.id}')"
            title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
      </div>
      ${sectionsHTML}
    `;

    canvas.appendChild(el);
  });
}

// ── Render standalone frames ────────────────
function reconcileFrames() {
  const activeFrameKeys = new Set();
  frames.forEach(frame => {
    const key = `frame-${frame.id}`;
    activeFrameKeys.add(key);
    const x = (positions[key]?.x ?? frame.x);
    const y = (positions[key]?.y ?? frame.y);

    let el = canvas.querySelector(`[data-drag-key="${key}"]`);
    if (el) {
      // Existing frame — update position + labels, preserve iframe
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      const labelEl = el.querySelector('.frame-label');
      if (labelEl) {
        labelEl.innerHTML = `
          <span class="drag-grip" data-drag-handle>⠿</span>
          <span class="frame-name clickable" data-pop="frame-name" data-frame-id="${frame.id}">${frame.label}</span>
          <span class="artboard-dims clickable" data-pop="frame-dims" data-frame-id="${frame.id}">${frame.width} × ${frame.height}</span>
          <button class="open-tab-btn" onclick="event.stopPropagation();window.open('${frame.url}','_blank')" title="Open in new tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('frame','${frame.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="node-delete" onclick="deleteFrame('${frame.id}')" title="Remove frame"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        `;
      }
      const frameContainer = el.querySelector('.artboard-frame');
      if (frameContainer) {
        frameContainer.style.width = frame.width + 'px';
        frameContainer.style.height = frame.height + 'px';
        const iframe = frameContainer.querySelector('iframe');
        if (iframe) {
          if (iframe.getAttribute('src') !== frame.url) iframe.src = frame.url;
          iframe.width = frame.width;
          iframe.height = frame.height;
        }
      }
    } else {
      // New frame — create from scratch
      el = document.createElement('div');
      el.className = 'standalone-frame';
      el.dataset.dragKey = key;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.innerHTML = `
        <div class="frame-label">
          <span class="drag-grip" data-drag-handle>⠿</span>
          <span class="frame-name clickable" data-pop="frame-name" data-frame-id="${frame.id}">${frame.label}</span>
          <span class="artboard-dims clickable" data-pop="frame-dims" data-frame-id="${frame.id}">${frame.width} × ${frame.height}</span>
          <button class="open-tab-btn" onclick="event.stopPropagation();window.open('${frame.url}','_blank')" title="Open in new tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('frame','${frame.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="node-delete" onclick="deleteFrame('${frame.id}')" title="Remove frame"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="artboard-frame" style="width:${frame.width}px;height:${frame.height}px;">
          <iframe src="${frame.url}" width="${frame.width}" height="${frame.height}" loading="lazy"${frame.allowfullscreen ? ' allowfullscreen' : ''}${frame.allow ? ` allow="${frame.allow}"` : ''}${frame.sandbox ? ` sandbox="${frame.sandbox}"` : ''}></iframe>
        </div>
      `;
      canvas.appendChild(el);
    }
  });
  // Remove orphaned standalone frames
  canvas.querySelectorAll('.standalone-frame[data-drag-key]').forEach(el => {
    if (!activeFrameKeys.has(el.dataset.dragKey)) el.remove();
  });
}

// ── Render file nodes ──────────────────────
function renderFileNodes() {
  canvas.querySelectorAll('.file-node').forEach(el => el.remove());
  fileNodes.forEach(fn => {
    const key = `file-${fn.id}`;
    const el = document.createElement('div');
    el.className = 'file-node';
    el.dataset.dragKey = key;
    el.style.left = (positions[key]?.x ?? fn.x) + 'px';
    el.style.top = (positions[key]?.y ?? fn.y) + 'px';
    el.style.width = (fn.width || 500) + 'px';

    if (fn.fileType === 'image') {
      el.innerHTML = `
        <div class="file-node-header" data-drag-handle>
          <span class="drag-grip" data-drag-handle>⠿</span>
          <span class="file-node-filename clickable" title="${escapeHtml(fn.source)}" onclick="event.stopPropagation();changeFilePath('${fn.id}')">${escapeHtml(fn.label)}</span>
          <span class="artboard-dims clickable" data-pop="file-dims" data-file-id="${fn.id}">${fn.width} × ${fn.height}</span>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('file','${fn.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="file-node-close" onclick="deleteFileNode('${fn.id}')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="file-image" style="height:${(fn.height || 300) - 42}px;">
          <img src="/api/file?path=${encodeURIComponent(fn.source)}" alt="${escapeHtml(fn.label)}"
               onerror="onFileImageError(this,'${fn.id}')" />
          <div class="file-error"></div>
        </div>
      `;
    } else if (fn.fileType === 'video') {
      el.innerHTML = `
        <div class="file-node-header" data-drag-handle>
          <span class="drag-grip" data-drag-handle>⠿</span>
          <span class="file-node-filename clickable" title="${escapeHtml(fn.source)}" onclick="event.stopPropagation();changeFilePath('${fn.id}')">${escapeHtml(fn.label)}</span>
          <span class="artboard-dims clickable" data-pop="file-dims" data-file-id="${fn.id}">${fn.width} × ${fn.height}</span>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('file','${fn.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="file-node-close" onclick="deleteFileNode('${fn.id}')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="file-video" style="height:${(fn.height || 350) - 42}px;">
          <video src="/api/file?path=${encodeURIComponent(fn.source)}" controls preload="metadata"></video>
        </div>
      `;
    } else if (fn.fileType === 'audio') {
      el.innerHTML = `
        <div class="file-node-header" data-drag-handle>
          <span class="drag-grip" data-drag-handle>⠿</span>
          <span class="file-node-filename clickable" title="${escapeHtml(fn.source)}" onclick="event.stopPropagation();changeFilePath('${fn.id}')">${escapeHtml(fn.label)}</span>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('file','${fn.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="file-node-close" onclick="deleteFileNode('${fn.id}')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="file-audio">
          <audio src="/api/file?path=${encodeURIComponent(fn.source)}" controls preload="metadata"></audio>
        </div>
      `;
    } else {
      const isModified = fn.content !== fn.originalContent;
      el.innerHTML = `
        <div class="file-node-header" data-drag-handle>
          <span class="drag-grip" data-drag-handle>⠿</span>
          ${isModified ? '<span class="file-modified-dot"></span>' : ''}
          <span class="file-node-filename clickable" title="${escapeHtml(fn.source)}" onclick="event.stopPropagation();changeFilePath('${fn.id}')">${escapeHtml(fn.label)}</span>
          <span class="artboard-dims clickable" data-pop="file-dims" data-file-id="${fn.id}">${fn.width} × ${fn.height}</span>
          <button class="ghost-btn" onclick="saveFileContent('${fn.id}')" ${isModified ? '' : 'disabled'}>Save</button>
          <button class="ghost-btn" onclick="resyncFileContent('${fn.id}')">Resync</button>
          <button class="duplicate-btn" onclick="event.stopPropagation();duplicateNode('file','${fn.id}')" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          <button class="file-node-close" onclick="deleteFileNode('${fn.id}')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <textarea class="file-editor" style="height:${(fn.height || 400) - 42}px;" data-file-node-id="${fn.id}" spellcheck="false">${escapeHtml(fn.content || '')}</textarea>
      `;

      // Attach textarea event listeners after insertion
      const textarea = el.querySelector('.file-editor');
      textarea.addEventListener('input', () => onFileEditorInput(fn.id, textarea));
      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = textarea.selectionStart;
          const end = textarea.selectionEnd;
          textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
          textarea.selectionStart = textarea.selectionEnd = start + 2;
          onFileEditorInput(fn.id, textarea);
        }
      });
    }

    canvas.appendChild(el);
  });
}

function onFileImageError(imgEl, nodeId) {
  imgEl.style.display = 'none';
  const errorDiv = imgEl.parentElement.querySelector('.file-error');
  if (!errorDiv) return;
  const fn = fileNodes.find(n => n.id === nodeId);
  if (!fn) return;
  errorDiv.style.display = 'block';
  fetch('/api/file?path=' + encodeURIComponent(fn.source))
    .then(r => r.json())
    .then(d => {
      errorDiv.textContent = d.error || 'Failed to load image';
      if (d.hint) errorDiv.textContent += '\n' + d.hint;
    })
    .catch(() => {
      errorDiv.textContent = 'Failed to load image';
    });
}

function onFileEditorInput(nodeId, textarea) {
  const fn = fileNodes.find(n => n.id === nodeId);
  if (!fn) return;
  fn.content = textarea.value;

  // Surgical DOM update: toggle modified dot and save button without re-rendering
  const fileNodeEl = textarea.closest('.file-node');
  if (fileNodeEl) {
    const isModified = fn.content !== fn.originalContent;
    const header = fileNodeEl.querySelector('.file-node-header');
    const existingDot = header.querySelector('.file-modified-dot');
    const saveBtn = header.querySelector('.ghost-btn');

    if (isModified && !existingDot) {
      const dot = document.createElement('span');
      dot.className = 'file-modified-dot';
      const filenameEl = header.querySelector('.file-node-filename');
      filenameEl.insertAdjacentElement('beforebegin', dot);
    } else if (!isModified && existingDot) {
      existingDot.remove();
    }

    if (saveBtn) saveBtn.disabled = !isModified;
  }

  saveCanvas();
}

function cleanPath(raw) {
  return raw.trim().replace(/^['"]/, '').replace(/['"]$/, '');
}

async function addFileNode() {
  const raw = prompt(
    'Absolute file path:\n\n' +
    'Tip: Cmd+Option+C copies the full path in Finder.\n' +
    'If images fail to load, grant Full Disk Access\nto your terminal in System Settings > Privacy & Security.'
  );
  if (!raw) return;
  const filePath = cleanPath(raw);

  const ext = '.' + filePath.split('.').pop().toLowerCase();
  const label = filePath.split('/').pop();
  const center = screenToCanvas(window.innerWidth / 2, window.innerHeight / 2);

  if (IMAGE_EXTS.has(ext)) {
    fileNodes.push({
      id: generateFileNodeId(),
      x: center.x - 250, y: center.y - 150,
      source: filePath, label,
      fileType: 'image',
      width: 500, height: 400,
      content: null, originalContent: null,
    });
    render();
    saveCanvas();
  } else if (VIDEO_EXTS.has(ext)) {
    fileNodes.push({
      id: generateFileNodeId(),
      x: center.x - 250, y: center.y - 175,
      source: filePath, label,
      fileType: 'video',
      width: 500, height: 350,
      content: null, originalContent: null,
    });
    render();
    saveCanvas();
  } else if (AUDIO_EXTS.has(ext)) {
    fileNodes.push({
      id: generateFileNodeId(),
      x: center.x - 200, y: center.y - 50,
      source: filePath, label,
      fileType: 'audio',
      width: 400, height: 100,
      content: null, originalContent: null,
    });
    render();
    saveCanvas();
  } else {
    try {
      const res = await fetch('/api/file/read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: filePath }),
      });
      const data = await res.json();
      if (!res.ok) {
        showClipToast(data.error || 'Failed to read file', true);
        return;
      }
      fileNodes.push({
        id: generateFileNodeId(),
        x: center.x - 250, y: center.y - 200,
        source: filePath, label,
        fileType: 'text',
        width: 500, height: 900,
        content: data.content, originalContent: data.content,
      });
      render();
      saveCanvas();
    } catch (err) {
      showClipToast('Failed to read file — server error', true);
    }
  }
}

async function saveFileContent(nodeId) {
  const fn = fileNodes.find(n => n.id === nodeId);
  if (!fn || fn.fileType !== 'text') return;

  try {
    const res = await fetch('/api/file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: fn.source, content: fn.content }),
    });
    const data = await res.json();
    if (!res.ok) {
      showClipToast(data.error || 'Save failed', true);
      return;
    }
    fn.originalContent = fn.content;
    renderFileNodes();
    saveCanvas();
    showClipToast('File saved');

    // Reload artboard iframes after hot reload delay
    setTimeout(() => {
      document.querySelectorAll('.artboard-frame iframe').forEach(f => { f.src = f.src; });
    }, 600);
  } catch (err) {
    showClipToast('Save failed — server error', true);
  }
}

async function resyncFileContent(nodeId) {
  const fn = fileNodes.find(n => n.id === nodeId);
  if (!fn || fn.fileType !== 'text') return;

  try {
    const res = await fetch('/api/file/read', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: fn.source }),
    });
    const data = await res.json();
    if (!res.ok) {
      showClipToast(data.error || 'Resync failed', true);
      return;
    }
    fn.content = data.content;
    fn.originalContent = data.content;
    renderFileNodes();
    saveCanvas();
    showClipToast('Resynced from disk');
  } catch (err) {
    showClipToast('Resync failed — server error', true);
  }
}

async function changeFilePath(nodeId) {
  const fn = fileNodes.find(n => n.id === nodeId);
  if (!fn) return;

  const rawPath = prompt(
    'New file path:\n\n' +
    'Tip: Cmd+Option+C copies the full path in Finder.',
    fn.source
  );
  if (!rawPath) return;
  const newPath = cleanPath(rawPath);
  if (newPath === fn.source) return;

  const ext = '.' + newPath.split('.').pop().toLowerCase();
  const newLabel = newPath.split('/').pop();
  const isImage = IMAGE_EXTS.has(ext);
  const isVideo = VIDEO_EXTS.has(ext);
  const isAudio = AUDIO_EXTS.has(ext);

  if (isImage || isVideo || isAudio) {
    fn.source = newPath;
    fn.label = newLabel;
    fn.fileType = isImage ? 'image' : isVideo ? 'video' : 'audio';
    fn.content = null;
    fn.originalContent = null;
    renderFileNodes();
    saveCanvas();
  } else {
    try {
      const res = await fetch('/api/file/read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: newPath }),
      });
      const data = await res.json();
      if (!res.ok) {
        showClipToast(data.error || 'Failed to read file', true);
        return;
      }
      fn.source = newPath;
      fn.label = newLabel;
      fn.fileType = 'text';
      fn.content = data.content;
      fn.originalContent = data.content;
      renderFileNodes();
      saveCanvas();
    } catch (err) {
      showClipToast('Failed to read file — server error', true);
    }
  }
}

function deleteFileNode(nodeId) {
  if (!confirm('Remove this file?')) return;
  const idx = fileNodes.findIndex(n => n.id === nodeId);
  if (idx !== -1) {
    fileNodes.splice(idx, 1);
    delete positions[`file-${nodeId}`];
    render();
    saveCanvas();
  }
}

// ── Prompt panel ─────────────────────────────
const promptPanel = document.getElementById('prompt-panel');
const copyToast = document.getElementById('copy-toast');

function togglePromptPanel() {
  const isHidden = promptPanel.style.display === 'none';
  promptPanel.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) {
    document.getElementById('prompt-desc').value = '';
    document.getElementById('prompt-desc').focus();
  }
}

function copyCanvasPrompt() {
  const descInput = document.getElementById('prompt-desc');
  const description = descInput.value.trim();

  if (!description) {
    descInput.focus();
    return;
  }

  const branchSummary = branches.map(b => `${b.branch} (:${b.port})`).join(', ');
  const routeSet = new Set();
  branches.forEach(b => b.screens.forEach(s => routeSet.add(s.route)));
  const routeSummary = [...routeSet].join(', ');
  const fileNodeCount = fileNodes.length;
  const noteCount = notes.length;
  const markerCount = markers.length;

  const contextLines = [
    `- Canvas: ${currentCanvasId || '(unsaved)'}`,
    `- Branches: ${branchSummary || '(none)'}`,
    `- Routes: ${routeSummary || '/'}`,
    `- File nodes: ${fileNodeCount}${fileNodeCount > 0 ? ` (${fileNodes.map(f => f.label).join(', ')})` : ''}`,
    `- Notes: ${noteCount}, Markers: ${markerCount}`,
  ];

  const promptText = [
    'Use the /live-canvas skill.',
    '',
    `Request: ${description}`,
    '',
    'Canvas context:',
    ...contextLines,
  ].join('\n');

  navigator.clipboard.writeText(promptText).then(() => {
    showCopyToast();
    togglePromptPanel();
  });
}

function showCopyToast() {
  showClipToast('Copied!');
}

// Close prompt panel when clicking outside
document.addEventListener('mousedown', (e) => {
  if (promptPanel.style.display !== 'none' &&
      !promptPanel.contains(e.target) &&
      !e.target.closest('#titlebar-right')) {
    promptPanel.style.display = 'none';
  }
});

// ── Add dropdown ────────────────────────────
function toggleAddDropdown() {
  if (addDropdown.classList.contains('visible')) {
    closeAddDropdown();
  } else {
    openAddDropdown();
  }
}

function openAddDropdown() {

function addBranch() {

  const portStr = prompt('Dev server port:', String(3000 + branches.length));

// ── Add standalone frame ────────────────────
function addFrame() {
  const port = prompt('Port:', '3000');
  if (!port) return;
  const route = prompt('Route:', '/');
  if (route === null) return;

// ── Delete artboard ─────────────────────────
function deleteArtboard(bIdx, sIdx) {
  const screen = branches[bIdx]?.screens[sIdx];
  if (!screen) return;
  if (!confirm(`Remove "${screen.name}" frame?`)) return;
  branches[bIdx].screens.splice(sIdx, 1);
  if (branches[bIdx].screens.length === 0) branches.splice(bIdx, 1);

  saveCanvas();
}
